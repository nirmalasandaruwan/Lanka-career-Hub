<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){var t=localStorage.getItem('lch_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <title>All Vacancies — Lanka Career Hub</title>
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/animations.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { navy: { DEFAULT: '#0a1628', light: '#132744' }, gold: { DEFAULT: '#d4a017' } } } }
    }
  </script>
</head>
<body>
  <div class="animated-bg">
    <div class="orb-wrap"><div class="orb orb-1"></div></div>
    <div class="orb-wrap"><div class="orb orb-2"></div></div>
    <div class="orb-wrap"><div class="orb orb-3"></div></div>
    <canvas id="particle-canvas"></canvas>
  </div>
  <div class="network-bg"></div>

  <nav class="navbar scrolled">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <img src="/assets/logo.png" alt="Lanka Career Hub" class="w-10 h-10 rounded-full">
        <span class="font-display font-bold text-lg text-white hidden sm:block">Lanka Career Hub</span>
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a href="/" class="nav-link">Home</a>
        <a href="/jobs.html" class="nav-link active">All Vacancies</a>
        <a href="/contact.html" class="nav-link">Contact Us</a>
      </div>
      <div class="flex items-center gap-3">
        <button type="button" class="theme-toggle hidden md:block" data-theme-toggle aria-label="Toggle day/night mode" title="Day / Night mode">
          <span class="theme-toggle-track">
            <span class="theme-toggle-icons"><span class="icon-sun">☀️</span><span class="icon-moon">🌙</span></span>
            <span class="theme-toggle-thumb"></span>
          </span>
        </button>
        <div id="nav-auth" class="hidden md:flex items-center gap-3">
          <a href="/login.html" class="btn-outline text-sm py-2 px-5">Login</a>
          <a href="/login.html?register=1" class="btn-gold text-sm py-2 px-5">Sign Up</a>
        </div>
        <div id="nav-user" class="hidden md:flex items-center gap-3">
          <span class="text-sm text-slate-300">Hello, <span class="user-name text-gold-gradient font-semibold"></span></span>
          <button onclick="logout()" class="btn-outline text-sm py-2 px-5">Logout</button>
        </div>
      </div>
      <button id="mobile-menu-btn" class="md:hidden text-white text-2xl">☰</button>
    </div>
  </nav>

  <div id="mobile-menu" class="mobile-menu">
    <button id="mobile-menu-close" class="absolute top-6 right-6 text-white text-2xl">✕</button>
    <div class="flex flex-col gap-6 mt-4">
      <a href="/" class="nav-link text-lg">Home</a>
      <a href="/jobs.html" class="nav-link text-lg">All Vacancies</a>
      <a href="/contact.html" class="nav-link text-lg">Contact Us</a>
      <div class="flex items-center justify-between pt-2 border-t border-white/10">
        <span class="text-slate-400">Day / Night</span>
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
          <span class="theme-toggle-track">
            <span class="theme-toggle-icons"><span class="icon-sun">☀️</span><span class="icon-moon">🌙</span></span>
            <span class="theme-toggle-thumb"></span>
          </span>
        </button>
      </div>
    </div>
  </div>

  <main class="relative z-10 pt-28 pb-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Header -->
      <div class="mb-8">
        <h1 class="text-3xl sm:text-4xl font-display font-bold text-white mb-2">All Vacancies</h1>
        <p class="text-slate-400" id="jobs-count">Loading jobs...</p>
      </div>

      <!-- Filters -->
      <div class="glass-card p-6 mb-8">
        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
          <div class="relative sm:col-span-2 lg:col-span-1">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
            <input type="text" id="search-input" class="search-input" placeholder="Search jobs...">
          </div>
          <select id="filter-district" class="filter-select">
            <option value="all">📍 All Districts</option>
          </select>
          <select id="filter-category" class="filter-select">
            <option value="all">💼 All Categories</option>
          </select>
          <button id="clear-filters" class="btn-outline text-sm">Clear Filters</button>
        </div>
        <div class="flex flex-wrap gap-2" id="work-type-pills"></div>
      </div>

      <!-- Jobs Grid -->
      <div id="jobs-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

      <!-- Pagination -->
      <div id="pagination" class="flex justify-center gap-2 mt-10"></div>
    </div>
  </main>

  <footer class="footer relative z-10">
    <div class="max-w-7xl mx-auto px-4 text-center text-sm text-slate-500">
      © 2026 Lanka Career Hub. All rights reserved.
    </div>
  </footer>

  <div id="job-modal" class="modal-overlay" onclick="if(event.target===this)closeJobModal()">
    <div class="modal-content">
      <button onclick="closeJobModal()" class="float-right text-slate-400 hover:text-white text-2xl mb-4">✕</button>
      <div id="job-modal-content"></div>
    </div>
  </div>

  <script src="/js/animations.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/jobs.js"></script>
  <button type="button" id="theme-toggle-float" class="theme-toggle-floating" data-theme-toggle aria-label="Toggle day/night mode" title="Day / Night mode">☀️</button>
</body>
</html>
